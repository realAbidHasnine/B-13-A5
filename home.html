<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        @media screen {}
    </style>
    <title>Github Home</title>
</head>

<body>

    <header>
        <nav class="flex justify-between items-center p-4 border-b border-gray-800">
            <div class="flex items-center gap-2">
                <img class="w-10 h-10" src="assets/github-logo.png" alt="">
                <p class="text-2xl font-bold">GitHub Issues Tracker</p>
            </div>
            <div class="flex items-center gap-2">

                <input id="input-search" type="text" placeholder="Search issues..."
                    class="input input-bordered w-24 md:w-auto" />
                <button id="btn-search" class="btn btn-primary flex items-center gap-2"><i
                        class="fa-brands fa-sistrix"></i> Search
                    Issue</button>
            </div>
        </nav>
    </header>


    <main>
        <section class="flex gap-5 w-[80%] bg-white mt-10 mx-auto border border-gray-800 py-5 px-3 rounded-md">
            <button id="all-btn" class="btn btn-primary px-8 text-center">All</button>
            <button id="open-btn" class="btn px-8">Open</button>
            <button id="close-btn" class="btn px-8">Closed</button>
        </section>

        <section
            class="flex items-center justify-between w-[80%] border border-gray-800 mt-5 mb-3 mx-auto shadow-sm py-5 px-3 rounded-md">

            <div class="flex items-center gap-3">
                <img src="assets/Aperture.png" alt="Aperture" class="w-10 h-10">
                <div>
                    <span id="issueCount" class="font-medium text-2xl">50</span>
                    <span class="font-medium text-2xl">Issues</span>
                    <p class="text-gray-600">Track and manage your project issues</p>
                </div>
            </div>


            <div class="flex items-center pr-3">
                <ul class="flex gap-5 ">
                    <li class="flex items-center gap-3 text-green-500"><span class="w-3 h-3 rounded-full bg-green-600 ">
                        </span> Open </li>
                </ul>
                <ul class="flex gap-5 ">
                    <li class="flex items-center gap-3 pl-3 text-purple-500"><span
                            class="w-3 h-3 rounded-full bg-purple-600"> </span> Closed </li>
                </ul>
            </div>
        </section>

        <section id="issue-container" class="grid grid-cols-4 mx-4 py-3 gap-3">

        </section>

        <section id="spinner" class="flex justify-center items-center py-4 hidden">
            <span class="loading loading-spinner loading-xl "></span>
        </section>

        <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
            <div class="modal-box">
                <div id="details-container" class="space-y-5"></div>

                <div class="modal-action">
                    <form method="dialog">

                        <button class="btn btn-primary">Close</button>
                    </form>
                </div>
            </div>
        </dialog>

    </main>


    <script src="script/home.js"></script>
</body>

</html>
