<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <title>GitHub Issue tracker</title>
</head>

<body>
    <div class="flex min-h-screen items-center justify-center" id="">

        <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-sm border p-4">

            <div class="flex flex-col items-center gap-2 mb-4">
                <img src="assets/github-logo.png" alt="">
                <h1 class="font-bold text-3xl">GitHub Issues Tracker</h1>
            </div>
            <legend class="fieldset-legend"></legend>

            <label class="label">Username</label>
            <input id="usernameInput" type="text" class="input" placeholder="" />

            <label class="label">Password</label>
            <input id="userPassword" type="password" class="input" placeholder="" />

            <button id="login-btn" class="btn btn-primary mt-4">Login</button>
            <div class="flex justify-center items-center gap-4 w-full mt-4">
                <hr class="flex-grow border-gray-400">
                
            </div>
            
            <div class="text-center py-[10PX]  rounded-[5px]">
                <p><span class="font-bold">Username:</span> admin</p>
                <p><span class="font-bold">Password:</span> admin123</p>
            </div>
        </fieldset>
    </div>

    <script src="script/login.js"></script>
</body>

</html>
